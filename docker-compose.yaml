version: '3.8'

services:
  product-service:
    build: ./ProductService
    container_name: product-service
    ports:
      - "8081:8081"
    networks:
      - app-network

  order-service:
    build: ./OrderService
    container_name: order-service
    ports: 
      - "8082:8082"
    depends_on:
      - product-service
    networks:
      - app-network
    environment:
      - ProductServiceUrl=http://product-service:8081/

networks:
  app-network:
    driver: bridge