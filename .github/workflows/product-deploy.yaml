services:

  - type: web
    name: product-service-api
    runtime: image
    repo: https://github.com/YatriPatel17/FinalProject
    branch: main
    rootDir: ProductService
    dockerContext: ProductService
    dockerfilePath: ProductService/Dockerfile
    envVars:
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:8081
      - key: WEBSITES_PORT
        value: "8081"
    healthCheckPath: /health
    plan: free