name: Deploy Product Service to Azure

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ProductService/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'product-service-api'
  DOTNET_VERSION: '9.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ProductService/ProductService.csproj

      - name: Build
        run: dotnet build ProductService/ProductService.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ProductService/ProductService.csproj -c Release -o ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish