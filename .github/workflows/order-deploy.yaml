name: Build and deploy Order Service to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'OrderService/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore dependencies
        run: dotnet restore OrderService/OrderService.csproj

      - name: Build with dotnet
        run: dotnet build OrderService/OrderService.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish OrderService/OrderService.csproj -c Release -o ${{env.DOTNET_ROOT}}/order-app

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: order-app
          path: ${{env.DOTNET_ROOT}}/order-app

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: order-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_ORDER }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_ORDER }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_ORDER }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'order-service-api'
          slot-name: 'Production'
          package: .